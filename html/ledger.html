<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger - Moonlight Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --primary: #2c3e50; --secondary: #27ae60; --white: #fff; --dark: #2c3e50; --light: #ecf0f1; --border: 1px solid #ddd; --shadow: 0 5px 15px rgba(0,0,0,.1); }
        body { background: #f5f7fa; }
        .header { background: var(--white); box-shadow: var(--shadow); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 2rem; font-weight: bold; color: var(--primary); text-decoration: none; }
        .logo i { color: var(--secondary); }
        .navbar ul { display: flex; list-style: none; gap: 1.5rem; flex-wrap: wrap; }
        .navbar a { text-decoration: none; color: var(--dark); font-size: 1.4rem; }
        .navbar a:hover { color: var(--secondary); }
        main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .heading { font-size: 2.5rem; text-align: center; margin-bottom: 2rem; color: var(--dark); }
        .heading span { color: var(--secondary); }
        .controls { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
        select, button { padding: .8rem 1.5rem; font-size: 1.4rem; border-radius: .5rem; border: var(--border); }
        button { background: var(--secondary); color: white; cursor: pointer; border: none; }
        table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: 1rem; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: var(--border); font-size: 1.3rem; }
        th { background: var(--primary); color: white; }
        .footer { background: var(--primary); color: white; text-align: center; padding: 2rem; margin-top: 3rem; }
        @media (max-width: 600px) { th, td { font-size: 1.1rem; padding: .5rem; } }
    </style>
</head>
<body>
<header class="header">
    <a href="index.html" class="logo"><i class="fas fa-chart-line"></i> Moonlight Trading</a>
    <nav class="navbar"><ul><li><a href="index.html">Home</a></li><li><a href="ledger.html">Ledger</a></li><li><a href="trial-balance.html">Trial Balance</a></li><li><a href="profit-loss.html">P&L</a></li><li><a href="balance-sheet.html">Balance Sheet</a></li></ul></nav>
</header>
<main>
    <h1 class="heading"><span>Ledger</span> Book</h1>
    <div class="controls">
        <select id="ledger-select"><option value="">-- Select Ledger --</option></select>
        <button onclick="loadLedger()"><i class="fas fa-search"></i> View Ledger</button>
    </div>
    <div id="ledger-result"></div>
</main>
<footer class="footer"><div>&copy; 2026 Moonlight Trading Company. All rights reserved.</div></footer>
<script>
let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
let ledgers = [...new Set(transactions.map(t => t.ledger))];
let sel = document.getElementById('ledger-select');
ledgers.forEach(l => { let opt = document.createElement('option'); opt.value = l; opt.textContent = l; sel.appendChild(opt); });
function loadLedger() {
    let ledger = sel.value;
    if (!ledger) { alert('Please select a ledger'); return; }
    let filtered = transactions.filter(t => t.ledger === ledger);
    let balance = 0;
    let html = `<table><thead><tr><th>Date</th><th>Type</th><th>Debit</th><th>Credit</th><th>Balance</th><th>Narration</th></tr></thead><tbody>`;
    filtered.forEach(t => {
        balance += (t.debit || 0) - (t.credit || 0);
        html += `<tr><td>${t.date}</td><td>${t.type}</td><td>${t.debit ? t.debit.toFixed(2) : '-'}</td><td>${t.credit ? t.credit.toFixed(2) : '-'}</td><td>${balance.toFixed(2)}</td><td>${t.narration || '-'}</td></tr>`;
    });
    html += `<tr style="background:#f0f0f0;font-weight:bold"><td colspan="4">Net Balance</td><td colspan="2">${balance.toFixed(2)}</td></tr>`;
    html += `</tbody></table>`;
    document.getElementById('ledger-result').innerHTML = html;
}
</script>
</body>
</html>
